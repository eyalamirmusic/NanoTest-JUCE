name: CI

on:
  push:
  pull_request:

jobs:
  desktop:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
          - name: Linux Clang
            os: ubuntu-latest
            cmake-args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          - name: Windows MSVC
            os: windows-latest
          - name: Windows Clang
            os: windows-latest
            cmake-args: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl
          - name: macOS
            os: macos-latest
            cmake-args: -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install JUCE dependencies (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev
          libfreetype-dev libasound2-dev libwebkit2gtk-4.1-dev
          libcurl4-openssl-dev
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake -B build -G Ninja ${{ matrix.cmake-args }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -B build -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0
      - name: Build
        run: cmake --build build -- -sdk iphonesimulator
